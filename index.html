<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>Three.js FPS Demo - 八叉树碰撞检测</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <link type="text/css" rel="stylesheet" href="main.css">
    <style>
        #info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 100;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: white;
            box-shadow: 0 0 3px rgba(0,0,0,0.5);
        }
        #crosshair::before {
            width: 2px;
            height: 20px;
            left: 9px;
            top: 0;
        }
        #crosshair::after {
            width: 20px;
            height: 2px;
            top: 9px;
            left: 0;
        }
        #controls-hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            line-height: 1.8;
            z-index: 100;
        }
        #controls-hint kbd {
            background: #444;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #666;
        }
    </style>
</head>
<body>
    <div id="info">
        <b>Three.js FPS Demo</b> - 八叉树碰撞检测<br/>
        <span style="font-size:12px">MOUSE 环顾四周 &amp; 投掷小球 | WASD 移动 &amp; SPACE 跳跃</span>
    </div>
    <div id="container"></div>
    <div id="crosshair"></div>
    <div id="controls-hint">
        <b>操作说明</b><br>
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动<br>
        <kbd>Mouse</kbd> 视角<br>
        <kbd>Space</kbd> 跳跃<br>
        <kbd>Click</kbd> 投掷小球
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { Octree } from 'three/addons/math/Octree.js';
        import { OctreeHelper } from 'three/addons/helpers/OctreeHelper.js';
        import { Capsule } from 'three/addons/math/Capsule.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        const timer = new THREE.Timer();
        timer.connect(document);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 0, 100);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ';

        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const fillLight1 = new THREE.HemisphereLight(0x8dc1de, 0x00668d, 1.2);
        fillLight1.position.set(2, 1, 1);
        scene.add(fillLight1);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
        directionalLight.position.set(-5, 25, -1);
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.near = 0.01;
        directionalLight.shadow.camera.far = 500;
        directionalLight.shadow.camera.right = 50;
        directionalLight.shadow.camera.left = -50;
        directionalLight.shadow.camera.top = 50;
        directionalLight.shadow.camera.bottom = -50;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.radius = 4;
        scene.add(directionalLight);

        const container = document.getElementById('container');
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setAnimationLoop(animate);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.VSMShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const fpsDisplay = document.createElement('div');
        fpsDisplay.style.cssText = 'position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:#0f0;padding:10px;border-radius:5px;font-family:monospace;font-size:14px;z-index:1000';
        document.body.appendChild(fpsDisplay);
        let frameCount = 0, lastFpsTime = performance.now();

        const GRAVITY = 30;
        const NUM_SPHERES = 50;
        const SPHERE_RADIUS = 0.25;
        const STEPS_PER_FRAME = 3;

        const sphereGeometry = new THREE.IcosahedronGeometry(SPHERE_RADIUS, 4);
        const sphereMaterials = [
            new THREE.MeshStandardMaterial({ color: 0xff6b6b, roughness: 0.3, metalness: 0.2 }),
            new THREE.MeshStandardMaterial({ color: 0x4ecdc4, roughness: 0.3, metalness: 0.2 }),
            new THREE.MeshStandardMaterial({ color: 0xffe66d, roughness: 0.3, metalness: 0.2 }),
            new THREE.MeshStandardMaterial({ color: 0x95e1d3, roughness: 0.3, metalness: 0.2 }),
        ];

        const spheres = [];
        let sphereIdx = 0;

        for (let i = 0; i < NUM_SPHERES; i++) {
            const material = sphereMaterials[i % sphereMaterials.length];
            const sphere = new THREE.Mesh(sphereGeometry, material);
            sphere.castShadow = true;
            sphere.receiveShadow = true;
            scene.add(sphere);

            spheres.push({
                mesh: sphere,
                collider: new THREE.Sphere(new THREE.Vector3(0, -100, 0), SPHERE_RADIUS),
                velocity: new THREE.Vector3()
            });
        }

        const worldOctree = new Octree();

        const playerCollider = new Capsule(new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, 1.7, 0), 0.35);
        const playerVelocity = new THREE.Vector3();
        const playerDirection = new THREE.Vector3();
        let playerOnFloor = false;
        let mouseTime = 0;

        const keyStates = {};
        const vector1 = new THREE.Vector3();
        const vector2 = new THREE.Vector3();
        const vector3 = new THREE.Vector3();

        document.addEventListener('keydown', (e) => { keyStates[e.code] = true; });
        document.addEventListener('keyup', (e) => { keyStates[e.code] = false; });

        container.addEventListener('mousedown', () => {
            document.body.requestPointerLock();
            mouseTime = performance.now();
        });

        document.addEventListener('mouseup', () => {
            if (document.pointerLockElement !== null) throwBall();
        });

        document.body.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX / 300;
                camera.rotation.x -= e.movementY / 300;
                camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function throwBall() {
            const sphere = spheres[sphereIdx];
            camera.getWorldDirection(playerDirection);
            sphere.collider.center.copy(playerCollider.end).addScaledVector(playerDirection, playerCollider.radius * 1.5);
            const impulse = 15 + 25 * (1 - Math.exp((mouseTime - performance.now()) * 0.001));
            sphere.velocity.copy(playerDirection).multiplyScalar(impulse);
            sphere.velocity.addScaledVector(playerVelocity, 2);
            sphereIdx = (sphereIdx + 1) % spheres.length;
        }

        function playerCollisions() {
            const result = worldOctree.capsuleIntersect(playerCollider);
            playerOnFloor = false;
            if (result) {
                playerOnFloor = result.normal.y >= 0.15;
                if (!playerOnFloor) {
                    playerVelocity.addScaledVector(result.normal, -result.normal.dot(playerVelocity));
                }
                if (result.depth >= 1e-10) {
                    playerCollider.translate(result.normal.multiplyScalar(result.depth));
                }
            }
        }

        function updatePlayer(deltaTime) {
            let damping = Math.exp(-4 * deltaTime) - 1;
            if (!playerOnFloor) {
                playerVelocity.y -= GRAVITY * deltaTime;
                damping *= 0.1;
            }
            playerVelocity.addScaledVector(playerVelocity, damping);
            playerCollider.translate(playerVelocity.clone().multiplyScalar(deltaTime));
            playerCollisions();
            camera.position.copy(playerCollider.end);
        }

        function playerSphereCollision(sphere) {
            const center = vector1.addVectors(playerCollider.start, playerCollider.end).multiplyScalar(0.5);
            const sphere_center = sphere.collider.center;
            const r = playerCollider.radius + sphere.collider.radius;
            const r2 = r * r;

            for (const point of [playerCollider.start, playerCollider.end, center]) {
                const d2 = point.distanceToSquared(sphere_center);
                if (d2 < r2) {
                    const normal = vector1.subVectors(point, sphere_center).normalize();
                    const v1 = vector2.copy(normal).multiplyScalar(normal.dot(playerVelocity));
                    const v2 = vector3.copy(normal).multiplyScalar(normal.dot(sphere.velocity));
                    playerVelocity.add(v2).sub(v1);
                    sphere.velocity.add(v1).sub(v2);
                    const d = (r - Math.sqrt(d2)) / 2;
                    sphere_center.addScaledVector(normal, -d);
                }
            }
        }

        function spheresCollisions() {
            for (let i = 0; i < spheres.length; i++) {
                for (let j = i + 1; j < spheres.length; j++) {
                    const s1 = spheres[i], s2 = spheres[j];
                    const d2 = s1.collider.center.distanceToSquared(s2.collider.center);
                    const r = s1.collider.radius + s2.collider.radius;
                    if (d2 < r * r) {
                        const normal = vector1.subVectors(s1.collider.center, s2.collider.center).normalize();
                        const v1 = vector2.copy(normal).multiplyScalar(normal.dot(s1.velocity));
                        const v2 = vector3.copy(normal).multiplyScalar(normal.dot(s2.velocity));
                        s1.velocity.add(v2).sub(v1);
                        s2.velocity.add(v1).sub(v2);
                        const d = (r - Math.sqrt(d2)) / 2;
                        s1.collider.center.addScaledVector(normal, d);
                        s2.collider.center.addScaledVector(normal, -d);
                    }
                }
            }
        }

        function updateSpheres(deltaTime) {
            spheres.forEach(sphere => {
                sphere.collider.center.addScaledVector(sphere.velocity, deltaTime);
                const result = worldOctree.sphereIntersect(sphere.collider);
                if (result) {
                    sphere.velocity.addScaledVector(result.normal, -result.normal.dot(sphere.velocity) * 1.5);
                    sphere.collider.center.add(result.normal.multiplyScalar(result.depth));
                } else {
                    sphere.velocity.y -= GRAVITY * deltaTime;
                }
                sphere.velocity.addScaledVector(sphere.velocity, Math.exp(-1.5 * deltaTime) - 1);
                playerSphereCollision(sphere);
            });
            spheresCollisions();
            spheres.forEach(sphere => {
                sphere.mesh.position.copy(sphere.collider.center);
            });
        }

        function getForwardVector() {
            camera.getWorldDirection(playerDirection);
            playerDirection.y = 0;
            playerDirection.normalize();
            return playerDirection;
        }

        function getSideVector() {
            camera.getWorldDirection(playerDirection);
            playerDirection.y = 0;
            playerDirection.normalize();
            playerDirection.cross(camera.up);
            return playerDirection;
        }

        function controls(deltaTime) {
            const speedDelta = deltaTime * (playerOnFloor ? 20 : 8);
            if (keyStates['KeyW'] || keyStates['ArrowUp']) playerVelocity.add(getForwardVector().multiplyScalar(speedDelta));
            if (keyStates['KeyS'] || keyStates['ArrowDown']) playerVelocity.add(getForwardVector().multiplyScalar(-speedDelta));
            if (keyStates['KeyA'] || keyStates['ArrowLeft']) playerVelocity.add(getSideVector().multiplyScalar(-speedDelta));
            if (keyStates['KeyD'] || keyStates['ArrowRight']) playerVelocity.add(getSideVector().multiplyScalar(speedDelta));
            if (playerOnFloor && keyStates['Space']) playerVelocity.y = 12;
        }

        let octreeHelper;
        let loaded = false;

        const loader = new GLTFLoader();
        loader.load(
            './models/gltf/collision-world.glb',
            (gltf) => {
                scene.add(gltf.scene);
                worldOctree.fromGraphNode(gltf.scene);
                gltf.scene.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        if (child.material && child.material.map) child.material.map.anisotropy = 4;
                    }
                });
                octreeHelper = new OctreeHelper(worldOctree);
                octreeHelper.visible = false;
                scene.add(octreeHelper);

                const gui = new GUI({ width: 200 });
                gui.add({ debug: false }, 'debug').name('显示碰撞体').onChange((v) => { octreeHelper.visible = v; });

                loaded = true;
            },
            undefined,
            () => { createFallbackWorld(); }
        );

        function createFallbackWorld() {
            const groundGeo = new THREE.PlaneGeometry(100, 100);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a5a40 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            const boxGeo = new THREE.BoxGeometry(2, 2, 2);
            const boxMat = new THREE.MeshStandardMaterial({ color: 0xbc6c25 });
            for (let i = 0; i < 20; i++) {
                const box = new THREE.Mesh(boxGeo, boxMat);
                box.position.set(Math.random() * 40 - 20, 1, Math.random() * 40 - 20);
                box.castShadow = true;
                box.receiveShadow = true;
                scene.add(box);
            }

            worldOctree.fromGraphNode(scene);
            octreeHelper = new OctreeHelper(worldOctree);
            octreeHelper.visible = false;
            scene.add(octreeHelper);
            loaded = true;
        }

        function teleportPlayerIfOob() {
            if (camera.position.y <= -25) {
                playerCollider.start.set(0, 0.35, 0);
                playerCollider.end.set(0, 1, 0);
                playerCollider.radius = 0.35;
                camera.position.copy(playerCollider.end);
                camera.rotation.set(0, 0, 0);
                playerVelocity.set(0, 0, 0);
            }
        }

        function animate() {
            timer.update();
            const deltaTime = Math.min(0.05, timer.getDelta()) / STEPS_PER_FRAME;

            if (loaded) {
                for (let i = 0; i < STEPS_PER_FRAME; i++) {
                    controls(deltaTime);
                    updatePlayer(deltaTime);
                    updateSpheres(deltaTime);
                    teleportPlayerIfOob();
                }
            }

            renderer.render(scene, camera);

            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                fpsDisplay.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsTime = now;
            }
        }
    </script>
</body>
</html>
